name: Deploy docs

# Manual only — never publishes on push. Trigger it from the GitHub mobile
# web UI (Actions → "Deploy docs" → Run workflow) or by asking Claude to run it.
on:
  workflow_dispatch:
    inputs:
      run_carousel_audit:
        description: "Also run the Carousel Builder audit (pairwise-combinatorial Chromium smoke test) and publish its report at /primitiv/kitchen-sink-audit/"
        type: boolean
        default: false

# Allow one concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      # Build the wasm package first: it generates crates/harmoni-wasm/pkg,
      # the workspace member the workbench depends on. Without it, pnpm install
      # fails to resolve the "harmoni-wasm" workspace package.
      - name: Build harmoni-wasm
        run: wasm-pack build crates/harmoni-wasm --target web

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Sub-path base + hash router so the SPA works under /primitiv/workbench/
      # and deep links survive a hard refresh on GitHub Pages. The sub-path
      # base also switches the app to the hash router (see apps/workbench/src/
      # main.tsx), so no separate flag is needed.
      - name: Build workbench
        env:
          WORKBENCH_BASE: /primitiv/workbench/
        run: pnpm --filter workbench build

      # The kitchen-sink is a real consumer, excluded from the pnpm workspace
      # (it has its own lockfile), so it installs standalone with
      # --ignore-workspace. Its Vite/tsconfig dev-aliases @primitiv-ui/react and
      # /icons to the workspace source, so this build exercises the CURRENT
      # branch's headless code — exactly what phone QA needs.
      - name: Install kitchen-sink dependencies
        run: pnpm install --ignore-workspace --no-frozen-lockfile
        working-directory: apps/kitchen-sink

      # Sub-path base + hash router so the SPA works under
      # /primitiv/kitchen-sink/ and deep links survive a hard refresh. Run
      # `vite build` directly (not the package's `tsc -b && vite build`): the
      # dev-alias resolves @primitiv-ui/react to the workspace *source*, and
      # tsconfig.app.json is a `composite` project — composite rejects program
      # files outside its `include` (TS6307), which those aliased source files
      # are. The deploy just needs the bundle; the real type gates run on
      # packages/react.
      - name: Build kitchen-sink
        env:
          KITCHEN_SINK_BASE: /primitiv/kitchen-sink/
        run: pnpm exec vite build
        working-directory: apps/kitchen-sink

      - name: Build docs
        run: pnpm --filter @primitiv-ui/docs docs:build

      # Opt-in (workflow_dispatch input, default off) — a pairwise-combinatorial
      # Chromium smoke test over the Carousel Builder's variant axes (see
      # .github/scripts/carousel-audit and docs/carousel-development-log.md).
      # Built unbased (plain BrowserRouter, clean /carousel/builder URLs) into
      # its own output dir — separate from the real sub-path/hash-router build
      # above — so the audit script doesn't have to reason about the deploy's
      # hash-routing; this is the same source, just a different Vite `base`.
      - name: Build kitchen-sink for audit
        if: ${{ inputs.run_carousel_audit }}
        run: pnpm exec vite build --outDir dist-audit
        working-directory: apps/kitchen-sink

      - name: Install Playwright for audit
        if: ${{ inputs.run_carousel_audit }}
        run: |
          npm install --no-audit --no-fund
          npx playwright install --with-deps chromium
        working-directory: .github/scripts/carousel-audit

      - name: Serve kitchen-sink audit build
        if: ${{ inputs.run_carousel_audit }}
        run: |
          pnpm exec vite preview --outDir dist-audit --port 4174 --strictPort &
          npx --yes wait-on http://localhost:4174 --timeout 30000
        working-directory: apps/kitchen-sink

      # Diagnostic, not a gate: a failing audit should still publish its report
      # (that's the whole point — see what broke), not block the docs deploy.
      - name: Run carousel audit
        if: ${{ inputs.run_carousel_audit }}
        env:
          AUDIT_BASE_URL: http://localhost:4174
        run: node run-audit.mjs "$GITHUB_WORKSPACE/carousel-audit-report" || true
        working-directory: .github/scripts/carousel-audit

      # Combine: the workbench, kitchen-sink, and (if run) the carousel audit
      # report are served from their own sub-paths within the docs site — each
      # is a separate SPA/page (its own HTML document), so there is no CSS
      # interaction with VitePress or each other.
      - name: Assemble site
        run: |
          cp -r apps/workbench/dist apps/docs/.vitepress/dist/workbench
          cp -r apps/kitchen-sink/dist apps/docs/.vitepress/dist/kitchen-sink
          if [ -d carousel-audit-report ]; then
            cp -r carousel-audit-report apps/docs/.vitepress/dist/kitchen-sink-audit
          fi
          touch apps/docs/.vitepress/dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
