name: E2E — Carousel loop

# Real-browser Playwright coverage for the Carousel infinite loop, run against
# the kitchen-sink loop page (which dev-aliases the workspace source, so it
# exercises the CURRENT branch's headless code). The whole point of running this
# in CI rather than the dev sandbox is WebKit: it's iOS Safari's engine core —
# the one engine with a real chance of surfacing the iOS-only scroll-snap quirks
# a plain Chromium can't — and its browser download is blocked in the sandbox but
# allowed on GitHub runners.
#
# NOTE: no engine simulates real touch momentum/inertia, so the fast-fling
# overshoot stays a real-device check; this gates the deterministic + engine
# behaviour (wrap always settles on a real slide, never a clone).
on:
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/react/src/Carousel/**"
      - "apps/kitchen-sink/**"
      - ".github/workflows/e2e-carousel.yml"

# One run per ref; a new push cancels an in-flight run.
concurrency:
  group: e2e-carousel-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc

      # The kitchen-sink is excluded from the pnpm workspace (own lockfile), so it
      # installs standalone — no wasm/workspace build needed for the headless
      # Carousel. Skip @playwright/test's postinstall browser fetch; the browsers
      # are installed explicitly (with the OS deps WebKit needs) in the next step.
      - name: Install kitchen-sink dependencies
        run: pnpm install --ignore-workspace --no-frozen-lockfile
        working-directory: apps/kitchen-sink
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps webkit chromium
        working-directory: apps/kitchen-sink

      # CI=true is set by Actions, so the config registers the webkit /
      # mobile-safari projects and starts its own vite server (no reuse).
      - name: Run Carousel e2e
        run: pnpm exec playwright test
        working-directory: apps/kitchen-sink

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/kitchen-sink/playwright-report
          retention-days: 14
