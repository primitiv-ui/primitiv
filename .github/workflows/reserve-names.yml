name: Reserve npm names (placeholders)

# One-off, MANUAL-ONLY workflow that publishes the placeholder packages under
# reserved/ to claim the unscoped npm names `primitiv-ui` and
# `create-primitiv-ui` ahead of the real release.
#
# This is NOT the real release workflow (that is publish.yml). It exists so the
# names can be reserved from a phone: add an NPM_TOKEN secret (a classic npm
# "Automation" token, or a granular token with publish + new-package rights),
# then run this workflow from the Actions tab. Delete it once the names are
# reserved.

on:
  workflow_dispatch:
    inputs:
      package:
        description: Which placeholder to publish
        type: choice
        options:
          - both
          - primitiv-ui
          - create-primitiv-ui
        default: both

jobs:
  reserve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
      - name: Publish placeholder(s)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -e
          pub() { ( cd "reserved/$1" && npm publish --access public ); }
          case "${{ inputs.package }}" in
            both) pub primitiv-ui; pub create-primitiv-ui ;;
            *)    pub "${{ inputs.package }}" ;;
          esac
