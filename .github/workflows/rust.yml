name: Rust

# The Rust test + coverage gate (RFC 0007 §7). Before this, Rust ran in no
# workflow. Two layers:
#   - `cargo test --workspace` compiles and runs every crate (harmoni-core,
#     harmoni-wasm, and the CLI crates), so the whole workspace is enforced.
#   - `cargo llvm-cov` gates the CLI workspace (primitiv-emit + primitiv-cli)
#     at 100% across lines, regions, AND functions — lines alone let an
#     untested branch slip through (RFC 0007 §7). The harmoni crates are
#     excluded from the gate (their discipline is already established);
#     excluding by name means new CLI crates fall under the gate automatically.

on:
  push:
    branches: [main]
    paths:
      - 'crates/**'
      # The primitiv-emit drift guards read the committed registry artifacts
      # (contract.json + the generated .tsx), so a registry-only change must
      # re-run this workflow or hand-drift slips through untested.
      - 'registry/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'
  pull_request:
    paths:
      - 'crates/**'
      # The primitiv-emit drift guards read the committed registry artifacts
      # (contract.json + the generated .tsx), so a registry-only change must
      # re-run this workflow or hand-drift slips through untested.
      - 'registry/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/rust.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      # Compile and test every crate in the workspace.
      - name: Test
        run: cargo test --workspace

      # Gate the CLI workspace at 100% on lines, regions, and functions.
      # Regions catch the branch a lines-only gate would miss. Excluding the
      # harmoni crates by name keeps future CLI crates (e.g. primitiv-emit)
      # covered without editing this list. The bin shell (primitiv-cli's
      # main.rs + the OsFs adapter) is NOT exempted: the tests/cli.rs e2e layer
      # runs the real binary and cargo-llvm-cov merges the subprocess's
      # coverage, so the shell hits 100% with no --ignore-filename-regex
      # carve-out (RFC 0007 §7, "glue not exempted").
      - name: Coverage gate (CLI crates, 100%)
        run: cargo llvm-cov --workspace --exclude harmoni-core --exclude harmoni-wasm --fail-under-lines 100 --fail-under-regions 100 --fail-under-functions 100
