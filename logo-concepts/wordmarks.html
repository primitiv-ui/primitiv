<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Primitiv / Harmoni — Jost wordmarks & lockups</title>
<style>
  :root { --bg:#fafafa; --fg:#111; --muted:#999; --line:#e6e6e6; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.4 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         color:var(--fg); background:var(--bg); padding:40px; }
  h1 { font-size:18px; font-weight:600; margin:0 0 4px; }
  h3 { font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
       margin:34px 0 12px; }
  .sub { color:var(--muted); margin:0 0 8px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; margin:0 0 16px; overflow:hidden; }
  .card .hd { font-size:12px; color:var(--muted); padding:10px 18px; border-bottom:1px solid var(--line); }
  .card .hd b { color:var(--fg); font-weight:600; }
  .row { display:flex; align-items:center; gap:48px; flex-wrap:wrap; padding:24px 26px; }
  .row.dark { background:#0e0e0e; }
  .row.dark img { filter:brightness(0) invert(1); }
  .wm { height:44px; }
  .lk { height:120px; }
  .lk.tall { height:190px; }
  .tag { color:var(--muted); font-size:11px; width:58px; flex:0 0 58px; }
  .pick { color:#0a7; font-weight:600; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:880px){ .grid2{ grid-template-columns:1fr; } }
</style>
</head>
<body>
  <h1>Primitiv / Harmoni — Jost, all-caps</h1>
  <p class="sub">Outlined paths, Medium (wght 500). Auto-reloads every 3s.</p>
  <div id="root"></div>

<script>
const TRACKS = [
  { t:"08", label:"0.08em — tight" },
  { t:"12", label:"0.12em" },
  { t:"16", label:"0.16em — chosen ★" },
  { t:"20", label:"0.20em — very open" },
];
let bust = Date.now();
const u = p => `${p}?b=${bust}`;
const img = (src,cls)=>{ const i=document.createElement("img"); i.className=cls; i.src=u(src); return i; };
const tag = t=>{ const s=document.createElement("span"); s.className="tag"; s.textContent=t; return s; };

function build(){
  const root=document.getElementById("root"); root.innerHTML="";

  // --- tracking ---
  const h1=document.createElement("h3"); h1.textContent="Tracking — pick the letter-spacing"; root.appendChild(h1);
  for(const tr of TRACKS){
    const c=document.createElement("div"); c.className="card";
    const hd=document.createElement("div"); hd.className="hd";
    hd.innerHTML = "tracking <b>"+tr.label.replace("★","<span class='pick'>★</span>")+"</b>";
    c.appendChild(hd);
    const r=document.createElement("div"); r.className="row";
    r.append(img(`wm-primitiv-jost-t${tr.t}.svg`,"wm"), img(`wm-harmoni-jost-t${tr.t}.svg`,"wm"));
    c.appendChild(r);
    root.appendChild(c);
  }

  // --- lockups ---
  const h2=document.createElement("h3"); h2.textContent="Lockups — mark + wordmark (tracking 0.16)"; root.appendChild(h2);
  const grid=document.createElement("div"); grid.className="grid2";
  grid.append(
    lockCard("Primitiv — horizontal", "lockup-primitiv-h.svg", "lk"),
    lockCard("Harmoni — horizontal",  "lockup-harmoni-h.svg",  "lk"),
    lockCard("Primitiv — stacked",    "lockup-primitiv-v.svg", "lk tall"),
    lockCard("Harmoni — stacked",     "lockup-harmoni-v.svg",  "lk tall"),
  );
  root.appendChild(grid);
}
function lockCard(title, src, cls){
  const c=document.createElement("div"); c.className="card";
  const hd=document.createElement("div"); hd.className="hd"; hd.innerHTML="<b>"+title+"</b>";
  c.appendChild(hd);
  const light=document.createElement("div"); light.className="row";
  light.append(tag("light"), img(src,cls)); c.appendChild(light);
  const dark=document.createElement("div"); dark.className="row dark";
  dark.append(tag("dark"), img(src,cls)); c.appendChild(dark);
  return c;
}

build();
setInterval(()=>{ bust=Date.now(); build(); }, 3000);
</script>
</body>
</html>
