<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flow rhythm harness (RFC 0016)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Khand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/tokens.css" />
    <link rel="stylesheet" href="/flow.css" />
    <style>
      /* Harness chrome only — not part of the system. */
      body {
        margin: 0;
        background: var(--primitiv-surface-default, #fff);
        color: var(--primitiv-content-primary, #111);
        font-family: var(--primitiv-body-md-font-family, sans-serif);
      }
      .toolbar {
        position: sticky;
        top: 0;
        display: flex;
        gap: 1rem;
        align-items: center;
        padding: 0.75rem 1.5rem;
        background: var(--primitiv-surface-raised, #f5f5f5);
        border-block-end: 1px solid var(--primitiv-border-subtle, #ddd);
        font-family: var(--primitiv-body-sm-font-family, sans-serif);
        z-index: 1;
      }
      .cols {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        padding: 2rem;
        align-items: start;
      }
      .panel {
        border: 1px solid var(--primitiv-border-subtle, #ddd);
        border-radius: 8px;
        padding: 1.5rem;
        background: var(--primitiv-surface-default, #fff);
      }
      .panel > h2.lbl {
        margin: 0 0 1rem;
        font: 600 0.75rem/1 var(--primitiv-body-sm-font-family, sans-serif);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--primitiv-content-muted, #888);
      }
      /* Visualise where margins land. */
      .ring :where(p, h1, h2, h3, h4, h5, h6, ul, ol, dl, blockquote, hr, figure, pre, .card, .field) {
        outline: 1px dashed rgba(255, 0, 128, 0.25);
      }
      .card {
        border: 1px solid var(--primitiv-border-subtle, #ddd);
        border-radius: 8px;
        padding: 1.25rem;
        background: var(--primitiv-surface-subtle, #fafafa);
      }
      .field label {
        display: block;
        font: 600 0.875rem/1.4 var(--primitiv-body-sm-font-family, sans-serif);
      }
      .field input {
        display: block;
        inline-size: 100%;
        box-sizing: border-box;
        padding: 0.5rem;
        border: 1px solid var(--primitiv-border-default, #bbb);
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <strong>RFC 0016 flow harness</strong>
      <label>density
        <select id="density">
          <option value="dense">dense</option>
          <option value="compact">compact</option>
          <option value="comfortable" selected>comfortable</option>
          <option value="spacious">spacious</option>
        </select>
      </label>
      <label><input type="checkbox" id="rings" /> margin rings</label>
      <label><input type="checkbox" id="theme" /> dark</label>
    </div>

    <div class="cols" id="root" data-density="comfortable" data-theme="light">
      <div class="panel">
        <h2 class="lbl">Bare (no flow context)</h2>
        <div id="bare"></div>
      </div>
      <div class="panel">
        <h2 class="lbl">.primitiv-flow</h2>
        <div class="primitiv-flow" id="flow"></div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
